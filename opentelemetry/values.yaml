mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  pullPolicy: IfNotPresent
  # Pinned to the chart's appVersion (avoid per-node version drift with "latest")
  tag: "0.139.0"

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    k8s_cluster:
      auth_type: serviceAccount
      collection_interval: 10s
      node_conditions_to_report:
        - Ready
        - MemoryPressure
        - DiskPressure
      allocatable_types_to_report:
        - cpu
        - memory
        - storage
        - ephemeral-storage
    # Meilisearch exposes Prometheus metrics on /metrics (behind an API key
    # with the metrics.get action; MEILI_EXPERIMENTAL_ENABLE_METRICS=true).
    # Gives per-index document counts, HTTP request latency/status codes and
    # task queue depth - used to detect empty/partial search indexes.
    prometheus/meilisearch:
      config:
        scrape_configs:
          - job_name: meilisearch-production
            scrape_interval: 30s
            metrics_path: /metrics
            authorization:
              type: Bearer
              credentials: ${env:MEILISEARCH_PROD_METRICS_KEY}
            static_configs:
              - targets: ["meilisearch.production.svc.cluster.local:7700"]
                labels:
                  deployment_environment: production
          - job_name: meilisearch-staging
            scrape_interval: 60s
            metrics_path: /metrics
            authorization:
              type: Bearer
              credentials: ${env:MEILISEARCH_STAGING_METRICS_KEY}
            static_configs:
              - targets: ["meilisearch.staging.svc.cluster.local:7700"]
                labels:
                  deployment_environment: staging

  processors:
    filter/drop_k8s_namespaces:
      metrics:
        exclude:
          match_type: regexp
          resource_attributes:
            - key: k8s.namespace.name
              value: (kube-system|kube-public|cert-manager)
    cumulativetodelta: {}
    batch:
      send_batch_max_size: 10000
      timeout: 10s
    resourcedetection:
      detectors: [env, system]
    k8sattributes:
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.container.name
          - k8s.deployment.name
          - k8s.node.name
          - container.image.name
          - container.image.tag
      pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: connection
    attributes/set_service_name:
      actions:
        - key: service.name
          from_attribute: k8s.container.name
          action: upsert
    tail_sampling:
      decision_wait: 20s
      policies:
        - name: "errors"
          type: status_code
          status_code:
            status_codes: [ERROR]
        - name: "probabilistic"
          type: probabilistic
          probabilistic:
            sampling_percentage: 10

  exporters:
    debug:
      verbosity: detailed
    otlp/uptrace:
      endpoint: https://otlp.uptrace.dev:4317
      tls: { insecure: false }
      headers:
        uptrace-dsn: ${UPTRACE_DSN}

  service:
    pipelines:
      metrics:
        receivers: [k8s_cluster]
        processors: [batch, resourcedetection]
        exporters: [debug, otlp/uptrace]
      logs/entity_events:
        receivers: [k8s_cluster]
        processors: [batch, resourcedetection]
        exporters: [debug, otlp/uptrace]
      metrics/meilisearch:
        receivers: [prometheus/meilisearch]
        processors: [cumulativetodelta, batch, resourcedetection]
        exporters: [otlp/uptrace]
      traces:
        receivers: [otlp]
        processors: [k8sattributes, batch, resourcedetection, tail_sampling]
        exporters: [otlp/uptrace]

resources:
  limits:
    cpu: 1000m
    memory: 256Mi
  requests:
    cpu: 500m
    memory: 128Mi

serviceAccount:
  create: true
  name: otel-collector

extraEnvs:
  - name: UPTRACE_DSN
    valueFrom:
      secretKeyRef:
        name: otel-collector-secrets
        key: UPTRACE_DSN
  - name: MEILISEARCH_PROD_METRICS_KEY
    valueFrom:
      secretKeyRef:
        name: otel-collector-secrets
        key: MEILISEARCH_PROD_METRICS_KEY
  - name: MEILISEARCH_STAGING_METRICS_KEY
    valueFrom:
      secretKeyRef:
        name: otel-collector-secrets
        key: MEILISEARCH_STAGING_METRICS_KEY

service:
  enabled: true
  type: ClusterIP