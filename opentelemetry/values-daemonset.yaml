mode: daemonset

image:
  repository: otel/opentelemetry-collector-contrib
  pullPolicy: IfNotPresent
  # Pinned to the chart's appVersion. "latest" + IfNotPresent led to nodes
  # running different collector versions depending on when they pulled.
  tag: "0.139.0"

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    kubeletstats:
      collection_interval: 15s
      auth_type: "serviceAccount"
      endpoint: "https://${K8S_NODE_IP}:10250"
      insecure_skip_verify: true
      metric_groups:
        - pod
        - node
        - container
    filelog:
      include:
        - /var/log/pods/*/*/*.log
      exclude:
        - /var/log/pods/monitoring_*/*/*.log
        - /var/log/pods/kube-system_*/*/*.log
        - /var/log/pods/kube-public_*/*/*.log
        - /var/log/pods/kubernetes-dashboard_*/*/*.log
        - /var/log/pods/ingress-nginx_*/*/*.log
        - /var/log/pods/cert-manager_*/*/*.log
      # "beginning" made every restart re-ingest the node's full log backlog,
      # blowing past the memory limit and crashlooping the collector.
      start_at: end
      include_file_path: true
      operators:
        - type: container
        # Only parse JSON-shaped lines; previously the parser errored on every
        # plain-text log line and DROPPED it (failed to write entry).
        - type: json_parser
          if: 'body matches "^\\{"'
          on_error: send_quiet
          parse_from: body
          timestamp:
            parse_from: attributes.time
            layout: 'ms'
            layout_type: epoch

  processors:
    filter/drop_k8s_namespaces:
      metrics:
        exclude:
          match_type: regexp
          resource_attributes:
            - key: k8s.namespace.name
              value: (kube-system|kube-public|cert-manager)
    cumulativetodelta: {}
    batch:
      send_batch_max_size: 10000
      timeout: 10s
    resourcedetection:
      detectors: [env, system]
    k8sattributes:
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.container.name
          - k8s.deployment.name
          - k8s.node.name
          - container.image.name
          - container.image.tag
      pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: connection
    attributes/set_service_name:
      actions:
        - key: service.name
          from_attribute: k8s.container.name
          action: upsert
    tail_sampling:
      decision_wait: 20s
      policies:
        - name: "errors"
          type: status_code
          status_code:
            status_codes: [ERROR]
        - name: "probabilistic"
          type: probabilistic
          probabilistic:
            sampling_percentage: 10

  exporters:
    debug:
      verbosity: detailed
    otlp/uptrace:
      endpoint: https://otlp.uptrace.dev:4317
      tls: { insecure: false }
      headers:
        uptrace-dsn: ${UPTRACE_DSN}

  service:
    pipelines:
      metrics:
        receivers: [kubeletstats]
        processors: [memory_limiter, filter/drop_k8s_namespaces, cumulativetodelta, batch, resourcedetection]
        exporters: [otlp/uptrace]
      logs:
        receivers: [filelog]
        processors: [memory_limiter, k8sattributes, attributes/set_service_name, batch, resourcedetection]
        exporters: [otlp/uptrace]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, batch, resourcedetection, tail_sampling]
        exporters: [otlp/uptrace]

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Give the collector time to start before the kubelet starts probing :13133.
# The previous zero-delay probes killed pods that were still initializing.
livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5
readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5

serviceAccount:
  # The service account is created by the cluster collector release (values.yaml);
  # this release reuses it. create: true here would make both Helm releases fight
  # over the same ServiceAccount.
  create: false
  name: otel-collector

extraEnvs:
  - name: K8S_NODE_IP
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: UPTRACE_DSN
    valueFrom:
      secretKeyRef:
        name: otel-collector-secrets
        key: UPTRACE_DSN

extraVolumes:
  - name: varlogpods
    hostPath:
      path: /var/log/pods
      type: Directory

extraVolumeMounts:
  - name: varlogpods
    mountPath: /var/log/pods
    readOnly: true

tolerations:
  - key: "role"
    operator: "Equal"
    value: "meilisearch"
    effect: "NoSchedule"

service:
  enabled: true
  type: ClusterIP