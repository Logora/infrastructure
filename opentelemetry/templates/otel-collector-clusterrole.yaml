apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - verbs:
      - get
      - list
      - watch
    apiGroups:
      - ''
    resources:
      - pods
      - nodes
      - nodes/stats
      - nodes/proxy
      - nodes/metrics
  - verbs:
      - get
    nonResourceURLs:
      - /metrics
      - /stats
      - /stats/summary
      - /stats/*
